<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECHO RUN | Phase. Teleport. Platforms.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Title Screen -->
        <div id="title-screen" class="screen">
            <h1 class="glitch">ECHO RUN</h1>
            <p class="subtitle">BREAK THE LOOP</p>
            <button id="start-btn" class="neon-btn">INITIALIZE</button>
        </div>

        <!-- Level Select -->
        <div id="level-select" class="screen hidden">
            <h2>SELECT SECTOR</h2>
            <div id="level-grid">
                <!-- Levels will be injected here -->
            </div>
            <button id="back-to-title" class="text-btn">RETURN</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <canvas id="game-canvas"></canvas>
            
            <div id="mobile-controls" class="hidden">
                <div class="control-group d-pad">
                    <button id="btn-left" class="touch-btn">
                        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                    </button>
                    <button id="btn-right" class="touch-btn">
                        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12l-4.58-4.59L10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </button>
                </div>
                <div class="control-group actions">
                    <button id="btn-phase" class="touch-btn phase-btn">RECORD</button>
                    <button id="btn-jump" class="touch-btn jump-btn">
                        <svg viewBox="0 0 24 24"><path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                    </button>
                </div>
                <button id="btn-pause" class="touch-btn pause-btn">
                    <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>

            <!-- Help Overlay -->
            <div id="help-overlay" class="hidden">
                <div class="help-content">
                    <h3>MISSION PROTOCOL</h3>
                    <ul>
                        <li><span class="key">A / D</span> - NAVIGATE</li>
                        <li><span class="key">SPACE</span> - ELEVATE</li>
                        <li><span class="key">SHIFT</span> - START/STOP RECORDING</li>
                        <li><span class="key">R</span> - RESET SECTOR</li>
                    </ul>
                    <p class="hint">"Your past is your platform."</p>
                </div>
            </div>

            <div id="pause-menu" class="hidden">
                <h3>MODULE PAUSED</h3>
                <button id="resume-btn" class="neon-btn">RESUME</button>
                <button id="restart-level-btn" class="text-btn">RESTART SECTOR</button>
                <button id="quit-to-select" class="text-btn">EXIT TO MAP</button>
            </div>
        </div>

        <div id="level-clear-screen" class="screen hidden">
            <h1 class="glitch">GOAL!</h1>
            <p class="subtitle">SECTOR SECURED</p>
            <div class="final-stats">
                <p>SECTOR: <span id="cleared-sector-id">-</span></p>
            </div>
            <button id="next-level-btn" class="neon-btn">PROCEED TO NEXT SECTOR</button>
            <button id="level-clear-to-select" class="text-btn">RETURN TO MAP</button>
        </div>

        <div id="clear-screen" class="screen hidden">
            <h1 class="glitch">SYSTEM CLEAR</h1>
            <p class="subtitle">ALL DATA CORES SECURED</p>
            <button id="return-to-title-btn" class="neon-btn">RETURN TO BASE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
